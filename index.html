<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rumo">
<meta name="theme-color" content="#20242B">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Rumo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EFEAE0;--paper-deep:#E4DECB;--card:#FBF9F3;
  --ink:#20242B;--ink-soft:#5B6168;--rule:#CBC2A9;
  --gold:#8A6D3B;--moss:#3E5C50;--moss-soft:#DCE4DD;
  --gold-soft:#EFE3CB;--danger:#7A4B32;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
#app{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;background:var(--paper);}
header{padding:14px 18px 10px;border-bottom:1px solid var(--rule);background:var(--paper);flex-shrink:0;}
.brand-row{display:flex;justify-content:space-between;align-items:baseline;}
.brand{font-family:'Spectral',serif;font-weight:600;font-size:23px;letter-spacing:.01em;}
.day-counter{font-size:12px;color:var(--ink-soft);font-weight:500;}
.tagline{font-family:'Spectral',serif;font-style:italic;font-size:12px;color:var(--ink-soft);margin-top:1px;}
.mini-strip{display:flex;gap:3px;margin-top:9px;}
.mini-cell{flex:1;height:4px;border-radius:2px;background:var(--rule);opacity:.5;}
.mini-cell.half{background:var(--gold);opacity:.6;}
.mini-cell.full{background:var(--moss);opacity:.9;}
.mini-cell.today{outline:1.5px solid var(--ink);outline-offset:1px;}
main{flex:1;overflow:auto;padding:18px 18px 80px;}
main.chat-mode{padding:0;overflow:hidden;}
h2.section-title{font-family:'Spectral',serif;font-weight:600;font-size:19px;margin:0 0 3px;}
p.section-sub{font-size:13px;color:var(--ink-soft);margin:0 0 14px;line-height:1.5;}
.step{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:14px;margin-bottom:11px;}
.step-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.step-title{font-weight:600;font-size:14px;}
.step-meta{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
.check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--rule);display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;flex-shrink:0;}
.check.done{background:var(--moss);border-color:var(--moss);color:var(--card);}
.step-instructions{font-size:13px;color:var(--ink-soft);line-height:1.5;margin:0 0 10px;}
.breath-wrap{display:flex;flex-direction:column;align-items:center;padding:6px 0 2px;}
.breath-circle-outer{width:110px;height:110px;display:flex;align-items:center;justify-content:center;}
#breathCircle{width:84px;height:84px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--moss-soft),var(--moss) 85%);animation:breatheCycle 10s linear infinite;animation-play-state:paused;box-shadow:0 4px 16px rgba(62,92,80,.25);}
@keyframes breatheCycle{0%{transform:scale(.68);}40%{transform:scale(1);}100%{transform:scale(.68);}}
@media(prefers-reduced-motion:reduce){#breathCircle{animation:breathePulse 10s linear infinite;animation-play-state:paused;}@keyframes breathePulse{0%,100%{opacity:.5;}40%{opacity:1;}}}
.breath-phase{font-family:'Spectral',serif;font-style:italic;font-size:14px;margin-top:10px;height:18px;}
.breath-timer,.body-timer{font-variant-numeric:tabular-nums;font-size:13px;color:var(--ink-soft);margin-top:2px;text-align:center;}
.body-prompt{text-align:center;padding:10px 0 2px;}
.body-prompt-text{font-family:'Spectral',serif;font-size:16px;margin-bottom:5px;}
.body-prompt-sub{font-size:11px;color:var(--ink-soft);}
.btn-row{display:flex;gap:7px;margin-top:10px;}
button{font-family:'Inter',sans-serif;border:none;cursor:pointer;border-radius:8px;font-size:13px;font-weight:600;padding:9px 12px;transition:opacity .15s;}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
button:active{opacity:.8;}button:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--ink);color:var(--card);flex:1;}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--rule);flex:1;}
.btn-full{width:100%;}
label.field-label{display:block;font-size:12px;color:var(--ink-soft);margin:0 0 4px;font-weight:500;}
input[type=text],input[type=date],input[type=password],textarea{width:100%;font-family:'Inter',sans-serif;font-size:14px;padding:9px 11px;border:1px solid var(--rule);border-radius:8px;background:var(--card);color:var(--ink);resize:none;}
textarea{min-height:58px;line-height:1.45;}
.intention-row{margin-bottom:9px;}
.complete-bar{margin-top:4px;margin-bottom:16px;}
.done-banner{background:var(--moss-soft);border:1px solid var(--moss);color:var(--moss);border-radius:8px;padding:10px 14px;font-size:13px;font-weight:500;text-align:center;}
/* CHAT */
.chat-outer{display:flex;flex-direction:column;height:100%;}
.chat-notice{background:var(--gold-soft);border-bottom:1px solid var(--rule);padding:8px 14px;font-size:12px;color:var(--gold);line-height:1.4;flex-shrink:0;}
.chat-topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px 7px;border-bottom:1px solid var(--rule);flex-shrink:0;}
.chat-topbar-label{font-size:12px;color:var(--ink-soft);font-weight:500;}
.chat-scroll{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:9px;}
.msg-wrap{display:flex;flex-direction:column;}
.msg-wrap.user{align-items:flex-end;}
.msg-wrap.ai{align-items:flex-start;}
.msg-bubble{max-width:87%;padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.msg-bubble.user{background:var(--ink);color:var(--card);border-bottom-right-radius:4px;}
.msg-bubble.ai{background:var(--card);color:var(--ink);border:1px solid var(--rule);border-bottom-left-radius:4px;}
.typing-dots{background:var(--card);border:1px solid var(--rule);border-radius:14px;border-bottom-left-radius:4px;padding:11px 15px;display:flex;align-items:center;gap:4px;}
.typing-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ink-soft);animation:typingDot 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes typingDot{0%,80%,100%{opacity:.2;}40%{opacity:1;}}
.chat-empty{padding:36px 18px;text-align:center;}
.chat-empty-title{font-family:'Spectral',serif;font-size:18px;margin-bottom:6px;}
.chat-empty-sub{font-size:13px;color:var(--ink-soft);line-height:1.5;margin-bottom:18px;}
.starter-btn{display:block;width:100%;background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:11px 14px;text-align:left;font-size:13px;color:var(--ink);margin-bottom:7px;cursor:pointer;font-weight:400;line-height:1.4;}
.starter-btn:hover{background:var(--paper-deep);}
.no-key-banner{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:18px;margin:18px;text-align:center;}
.no-key-title{font-family:'Spectral',serif;font-size:17px;margin-bottom:8px;}
.no-key-sub{font-size:13px;color:var(--ink-soft);line-height:1.5;margin-bottom:14px;}
.chat-input-area{border-top:1px solid var(--rule);padding:9px 12px;background:var(--paper);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
#chatInput{flex:1;min-height:38px;max-height:110px;padding:8px 11px;border:1px solid var(--rule);border-radius:10px;background:var(--card);color:var(--ink);font-size:14px;resize:none;overflow-y:auto;line-height:1.4;font-family:'Inter',sans-serif;}
#btnSend{width:38px;height:38px;border-radius:10px;background:var(--ink);color:var(--card);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;padding:0;}
/* PERCURSO */
.grid-wrap{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:13px;margin-bottom:14px;}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;}
.cell{aspect-ratio:1;border-radius:2px;border:1px solid var(--rule);}
.cell.half{background:var(--gold);border-color:var(--gold);opacity:.65;}
.cell.full{background:var(--moss);border-color:var(--moss);}
.cell.future{border-style:dashed;opacity:.4;}
.cell.today{outline:2px solid var(--ink);outline-offset:1px;}
.legend{display:flex;gap:10px;margin-top:9px;font-size:11px;color:var(--ink-soft);}
.legend span{display:inline-flex;align-items:center;gap:4px;}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block;border:1px solid var(--rule);}
.legend i.half{background:var(--gold);border-color:var(--gold);}
.legend i.full{background:var(--moss);border-color:var(--moss);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-card{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:12px;}
.stat-num{font-family:'Spectral',serif;font-size:24px;font-weight:600;line-height:1;}
.stat-label{font-size:11px;color:var(--ink-soft);margin-top:3px;}
.history-item{border-bottom:1px solid var(--rule);padding:9px 0;}
.history-item:last-child{border-bottom:none;}
.history-date{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px;}
.history-text{font-size:13px;line-height:1.5;}
.history-empty{font-size:13px;color:var(--ink-soft);font-style:italic;font-family:'Spectral',serif;}
details.settings{margin-top:18px;font-size:12px;color:var(--ink-soft);}
details.settings summary{cursor:pointer;font-weight:500;font-size:13px;}
.settings-body{margin-top:10px;display:flex;flex-direction:column;gap:10px;}
.settings-note{font-size:11px;color:var(--ink-soft);line-height:1.5;margin-top:2px;}
.danger-link{color:var(--danger);background:none;border:none;text-decoration:underline;font-size:12px;padding:0;font-weight:500;cursor:pointer;text-align:left;}
/* TABBAR */
nav#tabbar{flex-shrink:0;background:var(--paper);border-top:1px solid var(--rule);display:flex;width:100%;}
.tab-btn{flex:1;background:transparent;border:none;padding:11px 0 9px;font-size:11px;font-weight:600;color:var(--ink-soft);border-radius:0;position:relative;letter-spacing:.01em;}
.tab-btn.active{color:var(--ink);}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:22%;right:22%;height:2px;background:var(--ink);}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand-row">
      <div class="brand">Rumo</div>
      <div class="day-counter" id="dayCounter">—</div>
    </div>
    <div class="tagline">companion de reflexão</div>
    <div class="mini-strip" id="miniStrip"></div>
  </header>
  <main id="content"><div style="padding:60px 20px;text-align:center;color:var(--ink-soft);font-family:'Spectral',serif;font-style:italic;">a carregar…</div></main>
  <nav id="tabbar">
    <button class="tab-btn" data-tab="manha">Manhã</button>
    <button class="tab-btn" data-tab="conversa">Conversa</button>
    <button class="tab-btn" data-tab="noite">Noite</button>
    <button class="tab-btn" data-tab="percurso">Percurso</button>
  </nav>
</div>
<script>
(function(){
'use strict';

var MONTHS_PT=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
var BODY_PROMPTS=[
  'Repara nos pés e nas pernas.',
  'Repara no abdómen — tenso ou solto?',
  'Repara no peito e na respiração.',
  'Repara nos ombros.',
  'Repara no maxilar e na testa.',
  'Mais uma vez, do início ao fim, sem corrigir nada.'
];
var STARTERS=[
  'Hoje senti-me desconectado e não sei bem porquê.',
  'Houve um momento difícil. Gostava de perceber o que estava por baixo da minha reação.',
  'Acho que estou a cair no padrão de perseguir. Como paro?',
  'Ela fez algo que me magoou e não sei como reagir sem piorar as coisas.'
];
var SYSTEM_PROMPT='És um companion de reflexão emocional estruturado em dois frameworks com evidência clínica sólida: Emotionally Focused Therapy (EFT, Sue Johnson) e o Método Gottman. Não és um terapeuta — és uma ferramenta de apoio à auto-reflexão baseada nessa evidência.\n\nContexto do utilizador: está a trabalhar o afastamento emocional da sua parceira. Está no ciclo perseguir-retrair — tende a perseguir ligação quando ela recua. Está a trabalhar a sua própria regulação e padrões. Não tens acesso ao que a parceira pensa ou sente — foca-te sempre nele.\n\nEFT (Sue Johnson):\n— Ciclo perseguir-retrair: o afastamento dela não é rejeição pessoal — é uma posição defensiva de quem se sentiu sobrecarregada. O ciclo sustenta-se pelos dois lados sem culpa unilateral.\n— Emoções primárias vs secundárias: o que o utilizador expressa primeiro (frustração, crítica, pressão, raiva) é quase sempre emoção secundária. Por baixo está o medo de perder a ligação, a solidão, a vergonha de não ser suficiente, a tristeza. Ajuda-o a nomear o que está no fundo.\n— ARE: Accessible (disponível emocionalmente), Responsive (responsivo às necessidades dela), Engaged (presente). Usa como eixos de reflexão.\n— Necessidades de vinculação são legítimas. O problema está em expressá-las como pressão em vez de vulnerabilidade direta.\n\nGottman:\n— Quatro Cavaleiros (nos comportamentos dele, não dela): Crítica ("tu sempre/nunca…"), Desprezo (sarcasmo, menosprezo), Defensividade (contra-ataque, vitimização), Murar (shutdown, ausência). Identifica-os diretamente quando descreve os seus próprios comportamentos.\n— Antídotos: queixa específica sem ataque ao carácter; expressão de apreço genuíno; responsabilidade parcial mesmo que pequena; auto-regulação com pausa de 20 minutos quando em flooding.\n— Bids for connection: pequenas ofertas de ligação e a resposta (virar para / contra / de costas).\n\nCOMO TRABALHAR:\n— Faz perguntas abertas. Não diagnósticos.\n— Quando descreve uma reação, pergunta o que estava por baixo — a emoção primária.\n— Foca no que ELE fez e sentiu. Não atribuis estados internos, intenções ou motivações à parceira.\n— Quando identificas um Cavaleiro nos comportamentos que descreve, nomeia-o diretamente e dá o antídoto.\n— Valida a dor sem reforçar narrativa de vítima.\n— Em conversas substantivas, termina com: padrão identificado + emoção primária + uma intenção concreta para amanhã.\n— Respostas entre 3-8 frases. Apenas mais longas ao explicar um conceito pela primeira vez.\n\nLIMITES:\n— Se identificares sinais de depressão major, risco de auto-dano, ou violência, diz-lho diretamente e sugere apoio profissional.\n— Não fazes afirmações sobre o sistema nervoso, estado interno, ou intenções da parceira.\n\nLÍNGUA E TOM: Português de Portugal. Trata-o por tu. Direto, caloroso, sem condescendência.';

// ── STATE ─────────────────────────────────────────────────────
var state={tab:'manha',meta:null,journal:{},currentConvo:[],convoLoading:false};

// ── STORAGE (localStorage) ────────────────────────────────────
function sGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function sSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function sDel(k){try{localStorage.removeItem(k);}catch(e){}}
function getApiKey(){return sGet('rumo:apiKey')||'';}

// ── DATE ──────────────────────────────────────────────────────
function todayDate(){var d=new Date();d.setHours(0,0,0,0);return d;}
function toStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fromStr(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function addDays(d,n){var nd=new Date(d);nd.setDate(nd.getDate()+n);return nd;}
function todayStr(){return toStr(todayDate());}
function dayNum(){return Math.max(1,Math.round((todayDate()-fromStr(state.meta.startDate))/86400000)+1);}
function fmtShort(s){var d=fromStr(s);return d.getDate()+' '+MONTHS_PT[d.getMonth()];}

// ── JOURNAL ───────────────────────────────────────────────────
function entryFor(ds){return state.journal[ds]||{morning:{done:false},evening:{done:false}};}
function statusFor(ds){
  var e=state.journal[ds];if(!e)return'empty';
  var m=e.morning&&e.morning.done,n=e.evening&&e.evening.done;
  return m&&n?'full':m||n?'half':'empty';
}
function ensureToday(){
  var ds=todayStr();
  if(!state.journal[ds])state.journal[ds]={morning:{done:false},evening:{done:false}};
  return state.journal[ds];
}
function saveJ(){sSet('rumo:journal',JSON.stringify(state.journal));}
function saveM(){sSet('rumo:meta',JSON.stringify(state.meta));}

// ── INIT ──────────────────────────────────────────────────────
function init(){
  var mr=sGet('rumo:meta');
  var meta=mr?JSON.parse(mr):null;
  if(!meta){meta={startDate:todayStr()};sSet('rumo:meta',JSON.stringify(meta));}
  var jr=sGet('rumo:journal');
  state.meta=meta;
  state.journal=jr?JSON.parse(jr):{};
  renderHeader();
  render();
  // register SW
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  }
}

// ── HEADER ────────────────────────────────────────────────────
function renderHeader(){
  var dn=dayNum();
  document.getElementById('dayCounter').textContent=dn>90?'dia '+dn:'dia '+dn+' de 90';
  var start=fromStr(state.meta.startDate);
  var todayIdx=Math.min(Math.max(dn-1,0),89);
  var ws=Math.floor(todayIdx/7)*7;
  var strip=document.getElementById('miniStrip');strip.innerHTML='';
  for(var i=ws;i<ws+7;i++){
    var ds=toStr(addDays(start,i)),st=statusFor(ds);
    var div=document.createElement('div');
    div.className='mini-cell'+(st==='full'?' full':st==='half'?' half':'')+(i===todayIdx?' today':'');
    strip.appendChild(div);
  }
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  var main=document.getElementById('content');
  if(state.tab==='conversa'){
    main.className='chat-mode';
    renderConversa();
  } else {
    main.className='';
    if(state.tab==='manha'){ensureFreshTimers();main.innerHTML=renderManha();syncManhaUI();}
    else if(state.tab==='noite')main.innerHTML=renderNoite();
    else main.innerHTML=renderPercurso();
  }
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab===state.tab);});
  renderHeader();
  bindEvents();
}

// ── MANHÃ ─────────────────────────────────────────────────────
function renderManha(){
  var e=entryFor(todayStr());
  var done=e.morning&&e.morning.done;
  var ifv=(e.morning&&e.morning.intentionIf)||'';
  var thv=(e.morning&&e.morning.intentionThen)||'';
  return '<h2 class="section-title">Manhã</h2><p class="section-sub">Três passos antes do dia começar.</p>'+
  '<div class="step">'+
    '<div class="step-head"><div><div class="step-title">1. Respiração</div><div class="step-meta">2 min</div></div><div class="check" id="checkBreath">✓</div></div>'+
    '<p class="step-instructions">Sentado, pés apoiados. Inspira pelo nariz 4 seg, expira pela boca 6 seg.</p>'+
    '<div class="breath-wrap"><div class="breath-circle-outer"><div id="breathCircle"></div></div>'+
    '<div class="breath-phase" id="breathPhase">&nbsp;</div><div class="breath-timer" id="breathTimer">2:00</div></div>'+
    '<div class="btn-row"><button class="btn-primary" id="btnBreathToggle" data-action="breath-toggle">Iniciar</button><button class="btn-ghost" data-action="breath-reset">Reiniciar</button></div>'+
  '</div>'+
  '<div class="step">'+
    '<div class="step-head"><div><div class="step-title">2. Leitura do corpo</div><div class="step-meta">3 min</div></div><div class="check" id="checkBody">✓</div></div>'+
    '<p class="step-instructions">Sem corrigir nada — só repara no que o corpo está a fazer.</p>'+
    '<div class="body-prompt"><div class="body-prompt-text" id="bodyPromptText">'+BODY_PROMPTS[0]+'</div><div class="body-prompt-sub">apenas repara, não precisas de mudar nada</div></div>'+
    '<div class="body-timer" id="bodyTimer">3:00</div>'+
    '<div class="btn-row"><button class="btn-primary" id="btnBodyToggle" data-action="body-toggle">Iniciar</button><button class="btn-ghost" data-action="body-reset">Reiniciar</button></div>'+
  '</div>'+
  '<div class="step">'+
    '<div class="step-head"><div><div class="step-title">3. Intenção do dia</div><div class="step-meta">~2 min</div></div>'+
    '<div class="check'+((ifv||thv)?' done':'')+'" id="checkIntention">✓</div></div>'+
    '<p class="step-instructions">Uma intenção concreta, formato se / então.</p>'+
    '<div class="intention-row"><label class="field-label">Se…</label><input type="text" id="inputIf" placeholder="ex.: sentir vontade de perseguir resposta" value="'+ea(ifv)+'"></div>'+
    '<div class="intention-row"><label class="field-label">…então vou</label><input type="text" id="inputThen" placeholder="ex.: parar, respirar 4 vezes, não enviar" value="'+ea(thv)+'"></div>'+
    '<button class="btn-ghost btn-full" data-action="save-intention">Guardar intenção</button>'+
  '</div>'+
  '<div class="complete-bar">'+(done?'<div class="done-banner">Manhã registada.</div>':'<button class="btn-primary btn-full" data-action="complete-morning">Concluir prática da manhã</button>')+'</div>';
}

// breath timer
var breath={remaining:120,elapsed:0,running:false,secInt:null,phaseInt:null,dateStr:null};
function bUI(){var el=document.getElementById('breathTimer');if(el)el.textContent=Math.floor(breath.remaining/60)+':'+String(breath.remaining%60).padStart(2,'0');}
function bPhase(){var el=document.getElementById('breathPhase');if(el)el.textContent=(breath.elapsed%10000)<4000?'Inspira…':'Expira…';}
function startBreath(){
  if(breath.running||breath.remaining<=0)return;
  breath.running=true;
  var c=document.getElementById('breathCircle');if(c)c.style.animationPlayState='running';
  var btn=document.getElementById('btnBreathToggle');if(btn)btn.textContent='Pausar';
  breath.secInt=setInterval(function(){breath.remaining--;bUI();if(breath.remaining<=0){pauseBreath();markBreathDone();}},1000);
  breath.phaseInt=setInterval(function(){breath.elapsed+=100;bPhase();},100);
}
function pauseBreath(){
  breath.running=false;clearInterval(breath.secInt);clearInterval(breath.phaseInt);
  var c=document.getElementById('breathCircle');if(c)c.style.animationPlayState='paused';
  var btn=document.getElementById('btnBreathToggle');if(btn)btn.textContent=breath.remaining<=0?'Concluído':'Continuar';
}
function resetBreath(){
  pauseBreath();breath.remaining=120;breath.elapsed=0;bUI();
  var el=document.getElementById('breathPhase');if(el)el.textContent='\u00A0';
  var btn=document.getElementById('btnBreathToggle');if(btn)btn.textContent='Iniciar';
  var chk=document.getElementById('checkBreath');if(chk)chk.classList.remove('done');
}
function markBreathDone(){
  var chk=document.getElementById('checkBreath');if(chk)chk.classList.add('done');
  var btn=document.getElementById('btnBreathToggle');if(btn)btn.textContent='Concluído';
}
// body timer
var body={remaining:180,running:false,int:null,dateStr:null};
function bodyUI(){
  var el=document.getElementById('bodyTimer');if(el)el.textContent=Math.floor(body.remaining/60)+':'+String(body.remaining%60).padStart(2,'0');
  var idx=Math.min(5,Math.floor((180-body.remaining)/30));
  var pel=document.getElementById('bodyPromptText');if(pel)pel.textContent=BODY_PROMPTS[idx];
}
function startBody(){
  if(body.running||body.remaining<=0)return;
  body.running=true;
  var btn=document.getElementById('btnBodyToggle');if(btn)btn.textContent='Pausar';
  body.int=setInterval(function(){
    body.remaining--;bodyUI();
    if(body.remaining<=0){pauseBody();var chk=document.getElementById('checkBody');if(chk)chk.classList.add('done');var b=document.getElementById('btnBodyToggle');if(b)b.textContent='Concluído';}
  },1000);
}
function pauseBody(){body.running=false;clearInterval(body.int);var btn=document.getElementById('btnBodyToggle');if(btn)btn.textContent=body.remaining<=0?'Concluído':'Continuar';}
function resetBody(){pauseBody();body.remaining=180;bodyUI();var btn=document.getElementById('btnBodyToggle');if(btn)btn.textContent='Iniciar';var chk=document.getElementById('checkBody');if(chk)chk.classList.remove('done');}
function ensureFreshTimers(){
  var ds=todayStr();
  if(breath.dateStr!==ds){clearInterval(breath.secInt);clearInterval(breath.phaseInt);breath={remaining:120,elapsed:0,running:false,secInt:null,phaseInt:null,dateStr:ds};}
  if(body.dateStr!==ds){clearInterval(body.int);body={remaining:180,running:false,int:null,dateStr:ds};}
}
function syncManhaUI(){
  bUI();bPhase();
  var btnB=document.getElementById('btnBreathToggle');if(btnB)btnB.textContent=breath.remaining<=0?'Concluído':breath.running?'Pausar':breath.remaining<120?'Continuar':'Iniciar';
  var chkB=document.getElementById('checkBreath');if(chkB)chkB.classList.toggle('done',breath.remaining<=0);
  var c=document.getElementById('breathCircle');if(c)c.style.animationPlayState=breath.running?'running':'paused';
  bodyUI();
  var btnBody=document.getElementById('btnBodyToggle');if(btnBody)btnBody.textContent=body.remaining<=0?'Concluído':body.running?'Pausar':body.remaining<180?'Continuar':'Iniciar';
  var chkBody=document.getElementById('checkBody');if(chkBody)chkBody.classList.toggle('done',body.remaining<=0);
}
function saveIntention(){
  var ifv=document.getElementById('inputIf').value.trim();
  var thv=document.getElementById('inputThen').value.trim();
  var e=ensureToday();e.morning.intentionIf=ifv;e.morning.intentionThen=thv;
  saveJ();var chk=document.getElementById('checkIntention');if(chk&&(ifv||thv))chk.classList.add('done');
}
function completeMorning(){
  var e=ensureToday();e.morning.done=true;e.morning.completedAt=new Date().toISOString();
  var ifEl=document.getElementById('inputIf'),thEl=document.getElementById('inputThen');
  if(ifEl)e.morning.intentionIf=ifEl.value.trim();if(thEl)e.morning.intentionThen=thEl.value.trim();
  saveJ();render();
}

// ── CONVERSA ──────────────────────────────────────────────────
function renderConversa(){
  var main=document.getElementById('content');
  var apiKey=getApiKey();
  var existingInput=document.getElementById('chatInput');
  var inputVal=existingInput?existingInput.value:'';

  var msgsHtml='';
  if(!apiKey){
    msgsHtml='<div class="no-key-banner">'+
      '<div class="no-key-title">Chave API necessária</div>'+
      '<div class="no-key-sub">Para usar a conversa com IA, adiciona a tua chave API Anthropic nas Definições (tab Percurso → Definições).</div>'+
      '<button class="btn-primary" data-action="goto-settings">Ir para Definições</button>'+
    '</div>';
  } else if(state.currentConvo.length===0){
    msgsHtml='<div class="chat-empty">'+
      '<div class="chat-empty-title">Por onde queres começar?</div>'+
      '<div class="chat-empty-sub">Conta-me o que está na cabeça, ou escolhe um ponto de partida.</div>'+
      STARTERS.map(function(s){return'<button class="starter-btn" data-action="starter" data-text="'+ea(s)+'">'+eh(s)+'</button>';}).join('')+
    '</div>';
  } else {
    msgsHtml=state.currentConvo.map(function(m){
      var u=m.role==='user';
      return'<div class="msg-wrap '+(u?'user':'ai')+'"><div class="msg-bubble '+(u?'user':'ai')+'">'+eh(m.content)+'</div></div>';
    }).join('');
    if(state.convoLoading)msgsHtml+='<div class="msg-wrap ai"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  }

  var clearBtn=state.currentConvo.length>0&&apiKey?'<button class="btn-ghost" data-action="clear-convo" style="font-size:11px;padding:5px 9px;">Limpar</button>':'';
  var inputDisabled=!apiKey||state.convoLoading;

  main.innerHTML=
    '<div class="chat-outer">'+
      '<div class="chat-notice">Apoio à auto-reflexão baseado em EFT e Gottman. Não substitui terapia.</div>'+
      '<div class="chat-topbar"><span class="chat-topbar-label">Conversa de hoje</span>'+clearBtn+'</div>'+
      '<div class="chat-scroll" id="chatScroll">'+msgsHtml+'</div>'+
      '<div class="chat-input-area">'+
        '<textarea id="chatInput" placeholder="Escreve aqui…" rows="1"'+(inputDisabled?' disabled':'')+'>'+eh(inputVal)+'</textarea>'+
        '<button id="btnSend" data-action="send-msg"'+(inputDisabled?' disabled':'')+'>↑</button>'+
      '</div>'+
    '</div>';

  var scroll=document.getElementById('chatScroll');
  if(scroll)setTimeout(function(){scroll.scrollTop=scroll.scrollHeight;},0);
  var ta=document.getElementById('chatInput');
  if(ta&&!inputDisabled){
    ta.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px';});
    ta.addEventListener('keydown',function(ev){if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();handleSend();}});
  }
}

function handleSend(){
  var el=document.getElementById('chatInput');if(!el)return;
  var text=el.value.trim();if(!text||state.convoLoading)return;
  el.value='';el.style.height='auto';sendMsg(text);
}

async function sendMsg(text){
  var apiKey=getApiKey();if(!apiKey)return;
  state.currentConvo.push({role:'user',content:text});
  state.convoLoading=true;renderConversa();
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:SYSTEM_PROMPT,
        messages:state.currentConvo.slice(-20)
      })
    });
    var data=await res.json();
    if(data.error){
      state.currentConvo.push({role:'assistant',content:'Erro da API: '+data.error.message});
    } else {
      var reply=(data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
      state.currentConvo.push({role:'assistant',content:reply||'Não obtive resposta. Tenta novamente.'});
    }
  }catch(e){
    state.currentConvo.push({role:'assistant',content:'Erro de ligação. Verifica a internet e tenta novamente.'});
  }
  state.convoLoading=false;renderConversa();
}

function clearConvo(){
  if(state.currentConvo.length>0&&!confirm('Limpar esta conversa?'))return;
  state.currentConvo=[];state.convoLoading=false;renderConversa();
}

// ── NOITE ─────────────────────────────────────────────────────
function renderNoite(){
  var e=entryFor(todayStr());
  var done=e.evening&&e.evening.done;
  var q1=(e.evening&&e.evening.q1)||'',q2=(e.evening&&e.evening.q2)||'',q3=(e.evening&&e.evening.q3)||'';
  return '<h2 class="section-title">Reflexão noturna</h2><p class="section-sub">Três frases antes de dormir.</p>'+
  '<div class="step"><label class="field-label">Que padrão notei hoje em mim?</label><textarea id="q1" placeholder="ex.: fui buscar reafirmação; estava a perseguir">'+eh(q1)+'</textarea></div>'+
  '<div class="step"><label class="field-label">Emoção primária por baixo da reação?</label><textarea id="q2" placeholder="ex.: medo de ser deixado; solidão; vergonha de não ser suficiente">'+eh(q2)+'</textarea></div>'+
  '<div class="step"><label class="field-label">O que farei diferente amanhã?</label><textarea id="q3" placeholder="ex.: expressar o que preciso sem pressionar">'+eh(q3)+'</textarea></div>'+
  (done?'<div class="done-banner">Reflexão registada.</div>':'<button class="btn-primary btn-full" data-action="complete-evening">Guardar reflexão</button>');
}
function completeEvening(){
  var e=ensureToday();
  e.evening.q1=document.getElementById('q1').value.trim();
  e.evening.q2=document.getElementById('q2').value.trim();
  e.evening.q3=document.getElementById('q3').value.trim();
  e.evening.done=true;e.evening.completedAt=new Date().toISOString();
  saveJ();render();
}

// ── PERCURSO ──────────────────────────────────────────────────
function computeStats(){
  var start=fromStr(state.meta.startDate),dn=dayNum(),totalM=0,totalE=0,curS=0,longest=0,run=0;
  for(var i=0;i<Math.max(dn,1);i++){
    var e=state.journal[toStr(addDays(start,i))];
    var m=e&&e.morning&&e.morning.done,ev=e&&e.evening&&e.evening.done;
    if(m)totalM++;if(ev)totalE++;
    if(m){run++;if(run>longest)longest=run;}else run=0;
  }
  var i2=dn-1;
  while(i2>=0){var e2=state.journal[toStr(addDays(start,i2))];if(e2&&e2.morning&&e2.morning.done){curS++;i2--;}else break;}
  return{totalM,totalE,curS,longest};
}
function renderPercurso(){
  var start=fromStr(state.meta.startDate),dn=dayNum(),todayIdx=dn-1;
  var st=computeStats();
  var cells='';
  for(var i=0;i<90;i++){
    var s=statusFor(toStr(addDays(start,i)));
    var cls='cell'+(i>todayIdx?' future':s==='full'?' full':s==='half'?' half':'')+(i===todayIdx?' today':'');
    cells+='<div class="'+cls+'" title="dia '+(i+1)+'"></div>';
  }
  var recent=[];
  for(var j=Math.min(todayIdx,89);j>=0&&recent.length<7;j--){var ds=toStr(addDays(start,j));if(state.journal[ds])recent.push(ds);}
  var histHtml=recent.length?recent.map(function(ds){
    var e=state.journal[ds],parts=[];
    if(e.morning&&e.morning.done&&e.morning.intentionIf)parts.push('Intenção: se '+e.morning.intentionIf+' → '+e.morning.intentionThen+'.');
    if(e.evening&&e.evening.done&&e.evening.q2)parts.push('Emoção primária: '+e.evening.q2+'.');
    if(!parts.length)parts.push(e.morning&&e.morning.done&&e.evening&&e.evening.done?'Manhã e reflexão completas.':e.morning&&e.morning.done?'Manhã completa.':'Reflexão completa.');
    return'<div class="history-item"><div class="history-date">'+fmtShort(ds)+'</div><div class="history-text">'+eh(parts.join(' '))+'</div></div>';
  }).join(''):'<p class="history-empty">Ainda sem registos.</p>';
  var apiKeyVal=eh(getApiKey());
  return'<h2 class="section-title">Percurso</h2><p class="section-sub">Dia '+dn+' de 90.</p>'+
  '<div class="stats-grid">'+
    '<div class="stat-card"><div class="stat-num">'+st.curS+'</div><div class="stat-label">sequência atual</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+st.longest+'</div><div class="stat-label">melhor sequência</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+st.totalM+'</div><div class="stat-label">manhãs completas</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+st.totalE+'</div><div class="stat-label">reflexões noturnas</div></div>'+
  '</div>'+
  '<div class="grid-wrap"><div class="grid">'+cells+'</div><div class="legend"><span><i></i>por fazer</span><span><i class="half"></i>parcial</span><span><i class="full"></i>completo</span></div></div>'+
  '<h2 class="section-title" style="font-size:15px;margin-top:18px;">Últimos registos</h2>'+histHtml+
  '<details class="settings" id="settingsPanel"><summary>Definições</summary><div class="settings-body">'+
  '<div><label class="field-label">Início da prática</label><input type="date" id="startDateInput" value="'+state.meta.startDate+'"><button class="btn-ghost btn-full" data-action="save-start-date" style="margin-top:6px;">Guardar data</button></div>'+
  '<div><label class="field-label">API Key Anthropic (para conversa com IA)</label><input type="password" id="apiKeyInput" placeholder="sk-ant-…" value="'+apiKeyVal+'"><p class="settings-note">Guardada apenas neste dispositivo. Nunca enviada a terceiros.</p><button class="btn-ghost btn-full" data-action="save-api-key" style="margin-top:6px;">Guardar chave</button></div>'+
  '<button class="danger-link" data-action="reset-data">Apagar todos os registos</button>'+
  '</div></details>';
}
function saveStartDate(){var v=document.getElementById('startDateInput').value;if(v){state.meta.startDate=v;saveM();render();}}
function saveApiKey(){
  var v=document.getElementById('apiKeyInput').value.trim();
  sSet('rumo:apiKey',v);
  alert(v?'Chave guardada.':'Chave removida.');
}
function resetData(){
  if(!confirm('Apagar todos os registos? Esta ação não pode ser desfeita.'))return;
  state.journal={};state.meta={startDate:todayStr()};
  sDel('rumo:journal');saveM();saveJ();render();
}

// ── UTILS ─────────────────────────────────────────────────────
function eh(s){return(s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function ea(s){return eh(s);}

// ── EVENTS ────────────────────────────────────────────────────
function bindEvents(){
  var c=document.getElementById('content');
  c.onclick=function(ev){
    var t=ev.target.closest('[data-action]');if(!t)return;
    var a=t.dataset.action;
    if(a==='breath-toggle')breath.running?pauseBreath():startBreath();
    else if(a==='breath-reset')resetBreath();
    else if(a==='body-toggle')body.running?pauseBody():startBody();
    else if(a==='body-reset')resetBody();
    else if(a==='save-intention')saveIntention();
    else if(a==='complete-morning')completeMorning();
    else if(a==='complete-evening')completeEvening();
    else if(a==='send-msg')handleSend();
    else if(a==='clear-convo')clearConvo();
    else if(a==='starter')sendMsg(t.dataset.text);
    else if(a==='save-start-date')saveStartDate();
    else if(a==='save-api-key')saveApiKey();
    else if(a==='reset-data')resetData();
    else if(a==='goto-settings'){state.tab='percurso';render();setTimeout(function(){var el=document.getElementById('settingsPanel');if(el){el.open=true;el.scrollIntoView({behavior:'smooth'});}},100);}
  };
}

document.getElementById('tabbar').addEventListener('click',function(ev){
  var b=ev.target.closest('.tab-btn');if(!b)return;
  pauseBreath();pauseBody();
  state.tab=b.dataset.tab;render();
});

init();
})();
</script>
