<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rumo">
<meta name="theme-color" content="#20242B">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Rumo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EFEAE0;--paper-deep:#E4DECB;--card:#FBF9F3;
  --ink:#20242B;--ink-soft:#5B6168;--rule:#CBC2A9;
  --gold:#8A6D3B;--moss:#3E5C50;--moss-soft:#DCE4DD;
  --gold-soft:#EFE3CB;--danger:#7A4B32;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:16px;}
#app{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;background:var(--paper);}
header{padding:16px 20px 12px;border-bottom:1px solid var(--rule);background:var(--paper);flex-shrink:0;}
.brand-row{display:flex;justify-content:space-between;align-items:baseline;}
.brand{font-family:'Spectral',serif;font-weight:600;font-size:28px;letter-spacing:.01em;}
.day-counter{font-size:14px;color:var(--ink-soft);font-weight:500;}
.tagline{font-family:'Spectral',serif;font-style:italic;font-size:14px;color:var(--ink-soft);margin-top:2px;}
.mini-strip{display:flex;gap:3px;margin-top:10px;}
.mini-cell{flex:1;height:5px;border-radius:2px;background:var(--rule);opacity:.5;}
.mini-cell.half{background:var(--gold);opacity:.6;}
.mini-cell.full{background:var(--moss);opacity:.9;}
.mini-cell.today{outline:1.5px solid var(--ink);outline-offset:1px;}
main{flex:1;overflow:auto;padding:20px 20px calc(88px + var(--safe-bottom));}
main.chat-mode{padding:0;overflow:hidden;}
h2.section-title{font-family:'Spectral',serif;font-weight:600;font-size:23px;margin:0 0 4px;}
p.section-sub{font-size:15px;color:var(--ink-soft);margin:0 0 16px;line-height:1.5;}
.step{background:var(--card);border:1px solid var(--rule);border-radius:12px;padding:18px;margin-bottom:13px;}
.step-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.step-title{font-weight:600;font-size:17px;}
.step-meta{font-size:13px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
.check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--rule);display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;flex-shrink:0;}
.check.done{background:var(--moss);border-color:var(--moss);color:var(--card);}
.step-instructions{font-size:15px;color:var(--ink-soft);line-height:1.55;margin:0 0 12px;}
.breath-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;}
.breath-circle-outer{width:140px;height:140px;display:flex;align-items:center;justify-content:center;}
#breathCircle{width:108px;height:108px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--moss-soft),var(--moss) 85%);animation:breatheCycle 10s linear infinite;animation-play-state:paused;box-shadow:0 4px 20px rgba(62,92,80,.3);}
@keyframes breatheCycle{0%{transform:scale(.65);}40%{transform:scale(1);}100%{transform:scale(.65);}}
@media(prefers-reduced-motion:reduce){#breathCircle{animation:breathePulse 10s linear infinite;animation-play-state:paused;}@keyframes breathePulse{0%,100%{opacity:.5;}40%{opacity:1;}}}
.breath-phase{font-family:'Spectral',serif;font-style:italic;font-size:22px;margin-top:14px;height:28px;text-align:center;}
.breath-timer{font-variant-numeric:tabular-nums;font-size:16px;color:var(--ink-soft);margin-top:4px;text-align:center;}
.body-timer{font-variant-numeric:tabular-nums;font-size:16px;color:var(--ink-soft);margin-top:4px;text-align:center;}
.body-prompt{text-align:center;padding:14px 0 4px;}
.body-prompt-text{font-family:'Spectral',serif;font-size:20px;margin-bottom:6px;line-height:1.4;}
.body-prompt-sub{font-size:13px;color:var(--ink-soft);}
.audio-btn{font-size:16px;background:transparent;border:1px solid var(--rule);border-radius:8px;padding:5px 9px;cursor:pointer;line-height:1;color:var(--ink-soft);font-family:'Inter',sans-serif;font-weight:600;-webkit-tap-highlight-color:transparent;}
.audio-btn.active{background:var(--moss-soft);border-color:var(--moss);color:var(--moss);}
.btn-row{display:flex;gap:8px;margin-top:12px;}
button{font-family:'Inter',sans-serif;border:none;cursor:pointer;border-radius:10px;font-size:15px;font-weight:600;padding:12px 14px;transition:opacity .15s;-webkit-tap-highlight-color:transparent;}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
button:active{opacity:.75;}
button:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--ink);color:var(--card);flex:1;}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1.5px solid var(--rule);flex:1;}
.btn-full{width:100%;}
label.field-label{display:block;font-size:15px;color:var(--ink-soft);margin:0 0 6px;font-weight:500;}
input[type=text],input[type=date],input[type=password],textarea{width:100%;font-family:'Inter',sans-serif;font-size:16px;padding:12px 14px;border:1.5px solid var(--rule);border-radius:10px;background:var(--card);color:var(--ink);resize:none;}
textarea{min-height:70px;line-height:1.5;}
.intention-row{margin-bottom:12px;}
.complete-bar{margin-top:6px;margin-bottom:16px;}
.done-banner{background:var(--moss-soft);border:1px solid var(--moss);color:var(--moss);border-radius:10px;padding:14px 16px;font-size:15px;font-weight:500;text-align:center;}
.save-feedback{font-size:13px;color:var(--moss);font-weight:500;text-align:center;height:18px;margin-top:6px;}
/* CHAT */
.chat-outer{display:flex;flex-direction:column;height:100%;}
.chat-notice{background:var(--gold-soft);border-bottom:1px solid var(--rule);padding:10px 16px;font-size:13px;color:var(--gold);line-height:1.4;flex-shrink:0;}
.chat-topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 9px;border-bottom:1px solid var(--rule);flex-shrink:0;}
.chat-topbar-label{font-size:14px;color:var(--ink-soft);font-weight:500;}
.chat-scroll{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:11px;}
.msg-wrap{display:flex;flex-direction:column;}
.msg-wrap.user{align-items:flex-end;}
.msg-wrap.ai{align-items:flex-start;}
.msg-bubble{max-width:88%;padding:12px 15px;border-radius:16px;font-size:16px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.msg-bubble.user{background:var(--ink);color:var(--card);border-bottom-right-radius:4px;}
.msg-bubble.ai{background:var(--card);color:var(--ink);border:1.5px solid var(--rule);border-bottom-left-radius:4px;}
.typing-dots{background:var(--card);border:1.5px solid var(--rule);border-radius:16px;border-bottom-left-radius:4px;padding:13px 17px;display:flex;align-items:center;gap:5px;}
.typing-dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ink-soft);animation:typingDot 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes typingDot{0%,80%,100%{opacity:.2;}40%{opacity:1;}}
.chat-empty{padding:40px 20px;text-align:center;}
.chat-empty-title{font-family:'Spectral',serif;font-size:22px;margin-bottom:8px;}
.chat-empty-sub{font-size:15px;color:var(--ink-soft);line-height:1.5;margin-bottom:20px;}
.starter-btn{display:block;width:100%;background:var(--card);border:1.5px solid var(--rule);border-radius:12px;padding:14px 16px;text-align:left;font-size:15px;color:var(--ink);margin-bottom:9px;cursor:pointer;font-weight:400;line-height:1.45;-webkit-tap-highlight-color:transparent;}
.no-key-banner{background:var(--card);border:1.5px solid var(--rule);border-radius:12px;padding:22px 18px;margin:20px;text-align:center;}
.no-key-title{font-family:'Spectral',serif;font-size:20px;margin-bottom:10px;}
.no-key-sub{font-size:15px;color:var(--ink-soft);line-height:1.55;margin-bottom:16px;}
.chat-input-area{border-top:1px solid var(--rule);padding:11px 14px calc(11px + var(--safe-bottom));background:var(--paper);display:flex;gap:9px;align-items:flex-end;flex-shrink:0;}
#chatInput{flex:1;min-height:44px;max-height:120px;padding:11px 13px;border:1.5px solid var(--rule);border-radius:12px;background:var(--card);color:var(--ink);font-size:16px;resize:none;overflow-y:auto;line-height:1.4;font-family:'Inter',sans-serif;}
#btnSend{width:44px;height:44px;border-radius:12px;background:var(--ink);color:var(--card);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;padding:0;}
/* PERCURSO */
.grid-wrap{background:var(--card);border:1px solid var(--rule);border-radius:12px;padding:16px;margin-bottom:16px;}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;}
.cell{aspect-ratio:1;border-radius:3px;border:1px solid var(--rule);}
.cell.half{background:var(--gold);border-color:var(--gold);opacity:.65;}
.cell.full{background:var(--moss);border-color:var(--moss);}
.cell.future{border-style:dashed;opacity:.4;}
.cell.today{outline:2px solid var(--ink);outline-offset:1px;}
.legend{display:flex;gap:12px;margin-top:10px;font-size:13px;color:var(--ink-soft);}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend i{width:10px;height:10px;border-radius:2px;display:inline-block;border:1px solid var(--rule);}
.legend i.half{background:var(--gold);border-color:var(--gold);}
.legend i.full{background:var(--moss);border-color:var(--moss);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:var(--card);border:1px solid var(--rule);border-radius:12px;padding:14px;}
.stat-num{font-family:'Spectral',serif;font-size:30px;font-weight:600;line-height:1;}
.stat-label{font-size:13px;color:var(--ink-soft);margin-top:4px;}
.history-item{border-bottom:1px solid var(--rule);padding:11px 0;}
.history-item:last-child{border-bottom:none;}
.history-date{font-size:13px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px;}
.history-text{font-size:15px;line-height:1.5;}
.history-empty{font-size:15px;color:var(--ink-soft);font-style:italic;font-family:'Spectral',serif;}
details.settings{margin-top:20px;}
details.settings summary{cursor:pointer;font-weight:600;font-size:15px;color:var(--ink-soft);}
.settings-body{margin-top:12px;display:flex;flex-direction:column;gap:12px;}
.settings-note{font-size:13px;color:var(--ink-soft);line-height:1.5;margin-top:3px;}
.danger-link{color:var(--danger);background:none;border:none;text-decoration:underline;font-size:14px;padding:0;font-weight:500;cursor:pointer;text-align:left;}
nav#tabbar{flex-shrink:0;background:var(--paper);border-top:1px solid var(--rule);display:flex;width:100%;padding-bottom:var(--safe-bottom);}
.tab-btn{flex:1;background:transparent;border:none;padding:13px 0 11px;font-size:12px;font-weight:700;color:var(--ink-soft);border-radius:0;position:relative;letter-spacing:.02em;text-transform:uppercase;-webkit-tap-highlight-color:transparent;}
.tab-btn.active{color:var(--ink);}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--ink);}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand-row"><div class="brand">Rumo</div><div class="day-counter" id="dayCounter">—</div></div>
    <div class="tagline">companion de reflexão</div>
    <div class="mini-strip" id="miniStrip"></div>
  </header>
  <main id="content">
    <div style="padding:60px 20px;text-align:center;color:var(--ink-soft);font-family:'Spectral',serif;font-style:italic;">a carregar…</div>
  </main>
  <nav id="tabbar">
    <button class="tab-btn" data-tab="manha">Manhã</button>
    <button class="tab-btn" data-tab="conversa">Conversa</button>
    <button class="tab-btn" data-tab="noite">Noite</button>
    <button class="tab-btn" data-tab="percurso">Percurso</button>
  </nav>
</div>

var SYSTEM_PROMPT='És um companion de reflexão emocional estruturado em dois frameworks com evidência clínica sólida: Emotionally Focused Therapy (EFT, Sue Johnson) e o Método Gottman. Não és um terapeuta — és uma ferramenta de apoio à auto-reflexão baseada nessa evidência.\n\nContexto do utilizador: está a trabalhar o afastamento emocional da sua parceira. Está no ciclo perseguir-retrair — tende a perseguir ligação quando ela recua. Está a trabalhar a sua própria regulação e padrões. Não tens acesso ao que a parceira pensa ou sente — foca-te sempre nele.\n\nEFT (Sue Johnson):\n— Ciclo perseguir-retrair: o afastamento dela não é rejeição pessoal — é uma posição defensiva de quem se sentiu sobrecarregada.\n— Emoções primárias vs secundárias: frustração/crítica/pressão são quase sempre emoções secundárias. Por baixo: medo de perder a ligação, solidão, vergonha, tristeza.\n— ARE: Accessible, Responsive, Engaged. Usa como eixos de reflexão.\n\nGottman:\n— Quatro Cavaleiros (nos comportamentos dele): Crítica, Desprezo, Defensividade, Murar. Nomeia-os directamente.\n— Antídotos: queixa específica; apreço genuíno; responsabilidade parcial; pausa de 20 min em flooding.\n\nCOMO TRABALHAR:\n— Perguntas abertas. Foca no que ELE fez e sentiu. Emoção primária por baixo.\n— Identifica Cavaleiros, dá antídoto.\n— Termina conversas substantivas com: padrão + emoção primária + intenção para amanhã.\n— 3-8 frases. Português de Portugal. Tu. Direto, caloroso.\n\nLIMITES: depressão major, auto-dano ou violência → sugere apoio profissional imediatamente.';

var state={tab:'manha',meta:null,journal:{},currentConvo:[],convoLoading:false,breathAudio:true};

// ── STORAGE ────────────────────────────────────────────────────
function sGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function sSet(k,v){try{localStorage.setItem(k,v);return true;}catch(e){return false;}}
function sDel(k){try{localStorage.removeItem(k);}catch(e){}}
function getApiKey(){return sGet('rumo:apiKey')||'';}

// ── DATE ───────────────────────────────────────────────────────
function todayDate(){var d=new Date();d.setHours(0,0,0,0);return d;}
function toStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fromStr(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function addDays(d,n){var nd=new Date(d);nd.setDate(nd.getDate()+n);return nd;}
function todayStr(){return toStr(todayDate());}
function dayNum(){return Math.max(1,Math.round((todayDate()-fromStr(state.meta.startDate))/86400000)+1);}
function fmtShort(s){var d=fromStr(s);return d.getDate()+' '+MONTHS_PT[d.getMonth()];}

// ── JOURNAL ────────────────────────────────────────────────────
function entryFor(ds){return state.journal[ds]||{morning:{done:false},evening:{done:false}};}
function statusFor(ds){
  var e=state.journal[ds];if(!e)return'empty';
  var m=e.morning&&e.morning.done,n=e.evening&&e.evening.done;
  return m&&n?'full':m||n?'half':'empty';
}

  var ds=todayStr();
  if(!state.journal[ds])state.journal[ds]={morning:{done:false},evening:{done:false}};
  var e=state.journal[ds];
  if(!e.morning||typeof e.morning!=='object')e.morning={done:false};
  if(!e.evening||typeof e.evening!=='object')e.evening={done:false};
  return e;
}
function saveJ(){var ok=sSet('rumo:journal',JSON.stringify(state.journal));return ok;}
function saveM(){sSet('rumo:meta',JSON.stringify(state.meta));}

function init(){

// ── AUDIO ENGINE ───────────────────────────────────────────────
// KEY INSIGHT: iOS PWA requires audio to be played via the SAME Audio element
// that was first activated by a user gesture. Creating new Audio() in callbacks
// loses the gesture unlock. We use ONE shared element reused for all cues.

var sfx = new Audio(); // single shared element — never recreated
var scanIdx=0, scanTimer=null, breathAudioTimer=null;

function stopAllAudio(){
  clearTimeout(scanTimer);
  clearTimeout(breathAudioTimer);
  scanIdx=0;
  try{ sfx.pause(); sfx.onended=null; sfx.onerror=null; }catch(e){}
}

function playKey(key, onDone){
  if(!state.breathAudio||!AUDIO_DATA[key]){if(onDone)setTimeout(onDone,0);return;}
  try{
    sfx.pause();
    sfx.src=AUDIO_DATA[key];
    sfx.currentTime=0;
    sfx.onended=function(){if(onDone)onDone();};
    sfx.onerror=function(){if(onDone)onDone();};
    var p=sfx.play();
    if(p&&p.catch)p.catch(function(e){
      console.warn('Audio play blocked:',e.name);
      if(onDone)onDone();
    });
  }catch(e){if(onDone)onDone();}
}

// Breathing cues: Inspira (at cycle start) → wait → Expira → wait → loop
function startBreathAudio(){
  if(!state.breathAudio)return;
  doBreathCue('inhale');
}
function doBreathCue(phase){
  if(!breath.running||!state.breathAudio)return;
  var key=phase==='inhale'?'inspira':'expira';
  var wait=phase==='inhale'?3400:5400;
  playKey(key,function(){
    if(!breath.running||!state.breathAudio)return;
    breathAudioTimer=setTimeout(function(){
      doBreathCue(phase==='inhale'?'exhale':'inhale');
    },wait);
  });
}

// Body scan cues
var SCAN_SEQ=[
  {k:'scan_0', w:3000},
  {k:'scan_1', w:6000},
  {k:'scan_2', w:7000},
  {k:'scan_3', w:5000},
  {k:'scan_4', w:7000},
  {k:'scan_5', w:6000},
  {k:'scan_6', w:6000},
  {k:'scan_7', w:7000},
  {k:'scan_8', w:7000},
  {k:'scan_9', w:5000},
  {k:'scan_10',w:0}
];
function startBodyAudio(){
  if(!state.breathAudio)return;
  scanIdx=0;
  doScanCue();
}
function doScanCue(){
  if(!body.running||!state.breathAudio||scanIdx>=SCAN_SEQ.length)return;
  var step=SCAN_SEQ[scanIdx++];
  playKey(step.k,function(){
    if(!body.running||!state.breathAudio)return;
    if(step.w>0&&scanIdx<SCAN_SEQ.length)scanTimer=setTimeout(doScanCue,step.w);
  });
}

function toggleAudio(){
  state.breathAudio=!state.breathAudio;
  sSet('rumo:breathAudio',state.breathAudio?'true':'false');
  if(!state.breathAudio){
    stopAllAudio();
  } else if(breath.running){
    startBreathAudio();
  } else if(body.running){
    startBodyAudio();
  }
  var main=document.getElementById('content');
  ensureFreshTimers();main.innerHTML=renderManha();syncManhaUI();bindEvents();
}

// ── BREATH TIMER ───────────────────────────────────────────────
var breath={remaining:120,elapsed:0,running:false,secInt:null,phaseInt:null,dateStr:null};
function bUI(){var el=document.getElementById('breathTimer');if(el)el.textContent=Math.floor(breath.remaining/60)+':'+String(breath.remaining%60).padStart(2,'0');}
function bPhase(){var el=document.getElementById('breathPhase');if(el)el.textContent=(breath.elapsed%10000)<4000?'Inspira…':'Expira…';}
function startBreath(){
  if(breath.running||breath.remaining<=0)return;
  breath.running=true;
  // MUST call audio synchronously here — we are in the user gesture handler
  if(state.breathAudio)startBreathAudio();
  var c=document.getElementById('breathCircle');if(c)c.style.animationPlayState='running';
  var btn=document.getElementById('btnBreathToggle');if(btn)btn.textContent='Pausar';
  breath.secInt=setInterval(function(){breath.remaining--;bUI();if(breath.remaining<=0){pauseBreath();markBreathDone();}},1000);
  breath.phaseInt=setInterval(function(){breath.elapsed+=100;bPhase();},100);
}
function pauseBreath(){
  breath.running=false;clearInterval(breath.secInt);clearInterval(breath.phaseInt);
  stopAllAudio();
  var c=document.getElementById('breathCircle');if(c)c.style.animationPlayState='paused';
  var btn=document.getElementById('btnBreathToggle');if(btn)btn.textContent=breath.remaining<=0?'Concluído':'Continuar';
}
function resetBreath(){
  pauseBreath();breath.remaining=120;breath.elapsed=0;bUI();
  var el=document.getElementById('breathPhase');if(el)el.textContent=' ';
  var btn=document.getElementById('btnBreathToggle');if(btn)btn.textContent='Iniciar';
  var chk=document.getElementById('checkBreath');if(chk)chk.classList.remove('done');
}
function markBreathDone(){
  var chk=document.getElementById('checkBreath');if(chk)chk.classList.add('done');
  var btn=document.getElementById('btnBreathToggle');if(btn)btn.textContent='Concluído';
}

// ── BODY TIMER ─────────────────────────────────────────────────
var body={remaining:180,running:false,int:null,dateStr:null};
function bodyUI(){
  var el=document.getElementById('bodyTimer');if(el)el.textContent=Math.floor(body.remaining/60)+':'+String(body.remaining%60).padStart(2,'0');
  var idx=Math.min(5,Math.floor((180-body.remaining)/30));
  var pel=document.getElementById('bodyPromptText');if(pel)pel.textContent=BODY_PROMPTS[idx];
}
function startBody(){
  if(body.running||body.remaining<=0)return;
  body.running=true;
  // MUST call audio synchronously here — we are in the user gesture handler
  if(state.breathAudio)startBodyAudio();
  var btn=document.getElementById('btnBodyToggle');if(btn)btn.textContent='Pausar';
  body.int=setInterval(function(){
    body.remaining--;bodyUI();
    if(body.remaining<=0){
      pauseBody();
      var chk=document.getElementById('checkBody');if(chk)chk.classList.add('done');
      var b=document.getElementById('btnBodyToggle');if(b)b.textContent='Concluído';
    }
  },1000);
}
function pauseBody(){
  body.running=false;clearInterval(body.int);
  stopAllAudio();
  var btn=document.getElementById('btnBodyToggle');if(btn)btn.textContent=body.remaining<=0?'Concluído':'Continuar';
}
function resetBody(){
  pauseBody();body.remaining=180;bodyUI();
  var btn=document.getElementById('btnBodyToggle');if(btn)btn.textContent='Iniciar';
  var chk=document.getElementById('checkBody');if(chk)chk.classList.remove('done');
}
function ensureFreshTimers(){
  var ds=todayStr();
  if(breath.dateStr!==ds){clearInterval(breath.secInt);clearInterval(breath.phaseInt);stopAllAudio();breath={remaining:120,elapsed:0,running:false,secInt:null,phaseInt:null,dateStr:ds};}
  if(body.dateStr!==ds){clearInterval(body.int);stopAllAudio();body={remaining:180,running:false,int:null,dateStr:ds};}
}
function syncManhaUI(){
  bUI();bPhase();
  var btnB=document.getElementById('btnBreathToggle');if(btnB)btnB.textContent=breath.remaining<=0?'Concluído':breath.running?'Pausar':breath.remaining<120?'Continuar':'Iniciar';
  var chkB=document.getElementById('checkBreath');if(chkB)chkB.classList.toggle('done',breath.remaining<=0);
  var c=document.getElementById('breathCircle');if(c)c.style.animationPlayState=breath.running?'running':'paused';
  bodyUI();
  var btnBody=document.getElementById('btnBodyToggle');if(btnBody)btnBody.textContent=body.remaining<=0?'Concluído':body.running?'Pausar':body.remaining<180?'Continuar':'Iniciar';
  var chkBody=document.getElementById('checkBody');if(chkBody)chkBody.classList.toggle('done',body.remaining<=0);
}

function renderConversa(){
  var main=document.getElementById('content');
  var apiKey=getApiKey();
  var existingInput=document.getElementById('chatInput');
  var inputVal=existingInput?existingInput.value:'';
  var msgsHtml='';
  if(!apiKey){
    msgsHtml='<div class="no-key-banner"><div class="no-key-title">Chave API necessária</div>'+
    '<div class="no-key-sub">Para usar a conversa com IA, adiciona a tua chave API Anthropic nas Definições (tab Percurso → Definições).</div>'+
    '<button class="btn-primary" data-action="goto-settings">Ir para Definições</button></div>';
  } else if(state.currentConvo.length===0){
    msgsHtml='<div class="chat-empty"><div class="chat-empty-title">Por onde queres começar?</div>'+
    '<div class="chat-empty-sub">Conta-me o que está na cabeça, ou escolhe um ponto de partida.</div>'+
    STARTERS.map(function(s){return'<button class="starter-btn" data-action="starter" data-text="'+ea(s)+'">'+eh(s)+'</button>';}).join('')+'</div>';
  } else {
    msgsHtml=state.currentConvo.map(function(m){
      var u=m.role==='user';
      return'<div class="msg-wrap '+(u?'user':'ai')+'"><div class="msg-bubble '+(u?'user':'ai')+'">'+eh(m.content)+'</div></div>';
    }).join('');
    if(state.convoLoading)msgsHtml+='<div class="msg-wrap ai"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  }
  var clearBtn=state.currentConvo.length>0&&apiKey?'<button class="btn-ghost" data-action="clear-convo" style="font-size:13px;padding:7px 11px;">Limpar</button>':'';
  var inputDisabled=!apiKey||state.convoLoading;
  main.innerHTML='<div class="chat-outer">'+
    '<div class="chat-notice">Apoio à auto-reflexão baseado em EFT e Gottman. Não substitui terapia.</div>'+
    '<div class="chat-topbar"><span class="chat-topbar-label">Conversa de hoje</span>'+clearBtn+'</div>'+
    '<div class="chat-scroll" id="chatScroll">'+msgsHtml+'</div>'+
    '<div class="chat-input-area"><textarea id="chatInput" placeholder="Escreve aqui…" rows="1"'+(inputDisabled?' disabled':'')+'>'+eh(inputVal)+'</textarea>'+
    '<button id="btnSend" data-action="send-msg"'+(inputDisabled?' disabled':'')+'>↑</button></div></div>';
  var scroll=document.getElementById('chatScroll');
  if(scroll)setTimeout(function(){scroll.scrollTop=scroll.scrollHeight;},0);
  var ta=document.getElementById('chatInput');
  if(ta&&!inputDisabled){
    ta.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
    ta.addEventListener('keydown',function(ev){if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();handleSend();}});
  }
}
function handleSend(){
  var el=document.getElementById('chatInput');if(!el)return;
  var text=el.value.trim();if(!text||state.convoLoading)return;
  el.value='';el.style.height='auto';sendMsg(text);
}
async function sendMsg(text){
  var apiKey=getApiKey();if(!apiKey)return;
  state.currentConvo.push({role:'user',content:text});
  state.convoLoading=true;renderConversa();
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:SYSTEM_PROMPT,messages:state.currentConvo.slice(-20)})
    });
    var data=await res.json();
    if(data.error)state.currentConvo.push({role:'assistant',content:'Erro: '+data.error.message});
    else{var reply=(data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');state.currentConvo.push({role:'assistant',content:reply||'Sem resposta.'});}
  }catch(e){state.currentConvo.push({role:'assistant',content:'Erro de ligação. Verifica a internet e tenta novamente.'});}
  state.convoLoading=false;renderConversa();
}
function clearConvo(){
  if(state.currentConvo.length>0&&!confirm('Limpar esta conversa?'))return;
  state.currentConvo=[];state.convoLoading=false;renderConversa();
}

// ── PERCURSO ───────────────────────────────────────────────────
function computeStats(){
  var start=fromStr(state.meta.startDate),dn=dayNum(),totalM=0,totalE=0,curS=0,longest=0,run=0;
  for(var i=0;i<Math.max(dn,1);i++){
    var e=state.journal[toStr(addDays(start,i))];
    var m=e&&e.morning&&e.morning.done,ev=e&&e.evening&&e.evening.done;
    if(m)totalM++;if(ev)totalE++;
    if(m){run++;if(run>longest)longest=run;}else run=0;
  }
  var i2=dn-1;
  while(i2>=0){var e2=state.journal[toStr(addDays(start,i2))];if(e2&&e2.morning&&e2.morning.done){curS++;i2--;}else break;}
  return{totalM,totalE,curS,longest};
}
function renderPercurso(){
  var start=fromStr(state.meta.startDate),dn=dayNum(),todayIdx=dn-1;
  var st=computeStats();
  var cells='';
  for(var i=0;i<90;i++){
    var s=statusFor(toStr(addDays(start,i)));
    var cls='cell'+(i>todayIdx?' future':s==='full'?' full':s==='half'?' half':'')+(i===todayIdx?' today':'');
    cells+='<div class="'+cls+'" title="dia '+(i+1)+'"></div>';
  }
  var recent=[];
  for(var j=Math.min(todayIdx,89);j>=0&&recent.length<7;j--){var ds=toStr(addDays(start,j));if(state.journal[ds])recent.push(ds);}
  var histHtml=recent.length?recent.map(function(ds){
    var e=state.journal[ds],parts=[];
    if(e.morning&&e.morning.done&&e.morning.intentionIf)parts.push('Intenção: se '+e.morning.intentionIf+' → '+e.morning.intentionThen+'.');
    if(e.evening&&e.evening.done&&e.evening.q2)parts.push('Emoção primária: '+e.evening.q2+'.');
    if(!parts.length)parts.push(e.morning&&e.morning.done&&e.evening&&e.evening.done?'Manhã e reflexão completas.':e.morning&&e.morning.done?'Manhã completa.':'Reflexão completa.');
    return'<div class="history-item"><div class="history-date">'+fmtShort(ds)+'</div><div class="history-text">'+eh(parts.join(' '))+'</div></div>';
  }).join(''):'<p class="history-empty">Ainda sem registos.</p>';
  return'<h2 class="section-title">Percurso</h2><p class="section-sub">Dia '+dn+' de 90.</p>'+
  '<div class="stats-grid"><div class="stat-card"><div class="stat-num">'+st.curS+'</div><div class="stat-label">sequência atual</div></div>'+
  '<div class="stat-card"><div class="stat-num">'+st.longest+'</div><div class="stat-label">melhor sequência</div></div>'+
  '<div class="stat-card"><div class="stat-num">'+st.totalM+'</div><div class="stat-label">manhãs completas</div></div>'+
  '<div class="stat-card"><div class="stat-num">'+st.totalE+'</div><div class="stat-label">reflexões noturnas</div></div></div>'+
  '<div class="grid-wrap"><div class="grid">'+cells+'</div>'+
  '<div class="legend"><span><i></i>por fazer</span><span><i class="half"></i>parcial</span><span><i class="full"></i>completo</span></div></div>'+
  '<h2 class="section-title" style="font-size:17px;margin-top:20px;">Últimos registos</h2>'+histHtml+
  '<details class="settings" id="settingsPanel"><summary>Definições</summary><div class="settings-body">'+
  '<div><label class="field-label">Início da prática</label>'+
  '<input type="date" id="startDateInput" value="'+state.meta.startDate+'">'+
  '<button class="btn-ghost btn-full" data-action="save-start-date" style="margin-top:8px;">Guardar data</button></div>'+
  '<div><label class="field-label">API Key Anthropic</label>'+
  '<input type="password" id="apiKeyInput" placeholder="sk-ant-…" value="'+eh(getApiKey())+'">'+
  '<p class="settings-note">Guardada apenas neste dispositivo. Enviada só para api.anthropic.com.</p>'+
  '<button class="btn-ghost btn-full" data-action="save-api-key" style="margin-top:8px;">Guardar chave</button></div>'+
  '<button class="danger-link" data-action="reset-data">Apagar todos os registos</button>'+
  '</div></details>';
}
function saveStartDate(){var v=document.getElementById('startDateInput').value;if(v){state.meta.startDate=v;saveM();render();}}
function saveApiKey(){var v=((document.getElementById('apiKeyInput')||{}).value||'').trim();sSet('rumo:apiKey',v);alert(v?'Chave guardada.':'Chave removida.');}
function resetData(){if(!confirm('Apagar todos os registos?'))return;state.journal={};state.meta={startDate:todayStr()};sDel('rumo:journal');saveM();saveJ();render();}

// ── UTILS ──────────────────────────────────────────────────────
function eh(s){return(s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function ea(s){return eh(s);}

// ── EVENTS ─────────────────────────────────────────────────────
function bindEvents(){
  var c=document.getElementById('content');
  c.onclick=function(ev){
    var t=ev.target.closest('[data-action]');if(!t)return;
    var a=t.dataset.action;
    if(a==='breath-toggle')breath.running?pauseBreath():startBreath();
    else if(a==='breath-reset')resetBreath();
    else if(a==='toggle-audio')toggleAudio();
    else if(a==='body-toggle')body.running?pauseBody():startBody();
    else if(a==='body-reset')resetBody();
    else if(a==='save-intention')saveIntention();
    else if(a==='complete-morning')completeMorning();
    else if(a==='complete-evening')completeEvening();
    else if(a==='send-msg')handleSend();
    else if(a==='clear-convo')clearConvo();
    else if(a==='starter')sendMsg(t.dataset.text);
    else if(a==='save-start-date')saveStartDate();
    else if(a==='save-api-key')saveApiKey();
    else if(a==='reset-data')resetData();
    else if(a==='goto-settings'){state.tab='percurso';render();setTimeout(function(){var el=document.getElementById('settingsPanel');if(el){el.open=true;el.scrollIntoView({behavior:'smooth'});}},100);}
  };
  var ifEl=document.getElementById('inputIf'),thEl=document.getElementById('inputThen');
  if(ifEl)ifEl.addEventListener('blur',saveIntention);
  if(thEl)thEl.addEventListener('blur',saveIntention);
}

document.getElementById('tabbar').addEventListener('click',function(ev){
  var b=ev.target.closest('.tab-btn');if(!b)return;
  pauseBreath();pauseBody();
  state.tab=b.dataset.tab;render();
});

init();
})();
</script>
</body>
</html>
